name: Deploy API

# Déploiement SSH : rsync fiable (pas de coupure comme le FTPS) + exécution
# automatique de composer/migrations/cache. Aucune manipulation manuelle après
# un déploiement.
#
# Secrets requis : SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_PORT.
# Variable optionnelle : API_SSH_DIR (défaut commanderbuilder/api, relatif au home).
on:
  push:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REMOTE_DIR: ${{ vars.API_SSH_DIR || 'commanderbuilder/api' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync des sources API
        # --delete garde le serveur synchro ; les excludes protègent .env.local,
        # les clés JWT, var/ et vendor/ (ni transférés ni supprimés).
        run: |
          rsync -az --delete \
            --exclude='/.env.local' \
            --exclude='/config/jwt/' \
            --exclude='/var/' \
            --exclude='/vendor/' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            ./api/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${REMOTE_DIR}/"

      - name: Post-déploiement (composer, migrations, cache)
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_ed25519 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e; cd '${REMOTE_DIR}'; \
             composer install --no-dev --optimize-autoloader --no-interaction; \
             php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration; \
             php bin/console cache:clear; \
             php bin/console cache:warmup"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke tests API
        run: |
          set -e
          API="https://api.commanderbuilder.fr"
          echo "=== /api/login POST (attendu 400/401) ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/api/login" -X POST -H "Content-Type: application/json" -d '{}')
          [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ] || { echo "FAIL: $STATUS"; exit 1; }
          echo "=== /api/me (attendu 401) ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/api/me")
          [ "$STATUS" = "401" ] || { echo "FAIL: $STATUS"; exit 1; }
          echo "✅ API OK"
