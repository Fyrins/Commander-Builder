name: Deploy API

# Déploiement SSH : rsync fiable + composer/migrations/cache automatiques.
# Secrets : SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_PORT, REMOTE_PATH (base, ex. commanderbuilder/).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync des sources API
        run: |
          BASE="${{ secrets.REMOTE_PATH }}"; DIR="${BASE%/}/api"
          rsync -az --delete \
            --exclude='/.env.local' \
            --exclude='/config/jwt/' \
            --exclude='/var/' \
            --exclude='/vendor/' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            ./api/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$DIR/"

      - name: Post-déploiement (composer, migrations, cache)
        run: |
          BASE="${{ secrets.REMOTE_PATH }}"; DIR="${BASE%/}/api"
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e; cd '$DIR'; \
             composer install --no-dev --optimize-autoloader --no-interaction; \
             php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration; \
             php bin/console cache:clear; \
             php bin/console cache:warmup"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke tests API
        run: |
          set -e
          API="https://api.commanderbuilder.fr"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/api/login" -X POST -H "Content-Type: application/json" -d '{}')
          [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ] || { echo "FAIL login: $STATUS"; exit 1; }
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/api/me")
          [ "$STATUS" = "401" ] || { echo "FAIL me: $STATUS"; exit 1; }
          echo "✅ API OK"
