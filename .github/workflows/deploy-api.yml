name: Deploy API

# Déploiement FTPS via lftp : upload fiable (reconnexions auto, gère les coupures
# d'O2Switch). Le compte FTP est chrooté sur ~/commanderbuilder, donc la cible
# est /api/. Les excludes protègent .env.local, les clés JWT, var/ et vendor/.
#
# composer install / migrations restent manuels (pas de SSH depuis la CI sur
# O2Switch) : le workflow le rappelle uniquement quand composer.lock ou une
# migration change. Pour un simple changement de code : rien à faire.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Installer lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Upload API via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow true;
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:max-retries 5;
            set net:timeout 30;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 2;
            open -u \"\$FTP_USER\",\"\$FTP_PASS\" \"\$FTP_HOST\";
            mirror -R --delete --verbose \
              --exclude '\.env\.local$' \
              --exclude '^config/jwt/' \
              --exclude '^var/' \
              --exclude '^vendor/' \
              ./api/ /api/ ;
          "

      - name: Rappel composer / migrations si nécessaire
        run: |
          CHANGED=$(git diff HEAD~1 --name-only)
          if echo "$CHANGED" | grep -q "api/composer.lock"; then
            echo "⚠️  composer.lock a changé — en terminal cPanel : cd ~/commanderbuilder/api && composer install --no-dev --optimize-autoloader && php bin/console cache:clear && php bin/console cache:warmup"
          fi
          if echo "$CHANGED" | grep -q "api/migrations/"; then
            echo "⚠️  Nouvelles migrations — en terminal cPanel : php bin/console doctrine:migrations:migrate --no-interaction"
          fi
          if ! echo "$CHANGED" | grep -qE "api/(composer.lock|migrations/)"; then
            echo "✅ Changement de code seul — aucune commande manuelle nécessaire."
          fi

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke tests API
        run: |
          set -e
          API="https://api.commanderbuilder.fr"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/api/login" -X POST -H "Content-Type: application/json" -d '{}')
          [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ] || { echo "FAIL login: $STATUS"; exit 1; }
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/api/me")
          [ "$STATUS" = "401" ] || { echo "FAIL me: $STATUS"; exit 1; }
          echo "✅ API OK"
