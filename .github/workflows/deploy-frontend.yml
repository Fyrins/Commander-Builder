name: Deploy Frontend

# Déploiement SSH : build statique Nuxt puis rsync fiable vers le docroot.
#
# Secrets requis : SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_PORT.
# Variable optionnelle : FRONTEND_SSH_DIR (défaut commanderbuilder/www).
# Variable HCAPTCHA_SITE_KEY : clé de site hCaptcha (publique).
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REMOTE_DIR: ${{ vars.FRONTEND_SSH_DIR || 'commanderbuilder/www' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install --no-audit --no-fund

      - name: Run unit tests
        run: cd frontend && npm run test

      - name: Build
        run: cd frontend && npx nuxt generate
        env:
          NUXT_PUBLIC_API_BASE: https://api.commanderbuilder.fr/api
          NUXT_PUBLIC_HCAPTCHA_SITE_KEY: ${{ vars.HCAPTCHA_SITE_KEY || '10000000-ffff-ffff-ffff-000000000001' }}

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync du build vers le docroot
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            ./frontend/.output/public/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${REMOTE_DIR}/"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Attendre propagation
        run: sleep 15

      - name: Smoke tests frontend
        run: |
          set -e
          URL="https://commanderbuilder.fr"
          STATUS=""
          for attempt in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            [ "$STATUS" = "200" ] && break
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "FAIL: homepage $STATUS"; exit 1; }
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/manifest.webmanifest")
          [ "$STATUS" = "200" ] || { echo "FAIL: manifest $STATUS"; exit 1; }
          echo "✅ Front OK"
