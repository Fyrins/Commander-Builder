name: Deploy Frontend

# Déploiement FTPS via lftp : build statique Nuxt puis upload fiable vers le
# docroot. Compte FTP chrooté sur ~/commanderbuilder, cible /www/.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install --no-audit --no-fund

      - name: Run unit tests
        run: cd frontend && npm run test

      - name: Build
        run: cd frontend && npx nuxt generate
        env:
          NUXT_PUBLIC_API_BASE: https://api.commanderbuilder.fr/api
          NUXT_PUBLIC_HCAPTCHA_SITE_KEY: ${{ vars.HCAPTCHA_SITE_KEY || '10000000-ffff-ffff-ffff-000000000001' }}

      - name: Installer lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Upload du build via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow true;
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:max-retries 5;
            set net:timeout 30;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 2;
            open -u \"\$FTP_USER\",\"\$FTP_PASS\" \"\$FTP_HOST\";
            mirror -R --delete --verbose ./frontend/.output/public/ /www/ ;
          "

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Attendre propagation
        run: sleep 15
      - name: Smoke tests frontend
        run: |
          set -e
          URL="https://commanderbuilder.fr"
          STATUS=""
          for attempt in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            [ "$STATUS" = "200" ] && break
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "FAIL homepage: $STATUS"; exit 1; }
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/manifest.webmanifest")
          [ "$STATUS" = "200" ] || { echo "FAIL manifest: $STATUS"; exit 1; }
          echo "✅ Front OK"
