name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run unit tests
        run: cd frontend && npm run test

      - name: Build
        run: cd frontend && npx nuxt generate
        env:
          NUXT_PUBLIC_API_BASE: https://api.commanderbuilder.fr/api
          # Clé de site hCaptcha (publique). Repli sur la clé de test si la variable
          # de dépôt HCAPTCHA_SITE_KEY est absente, pour ne pas injecter une chaîne vide.
          NUXT_PUBLIC_HCAPTCHA_SITE_KEY: ${{ vars.HCAPTCHA_SITE_KEY || '10000000-ffff-ffff-ffff-000000000001' }}

      - name: Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./frontend/.output/public/
          # FTP chrooté sur la racine du compte
          server-dir: ${{ vars.FRONTEND_DIR || './www/' }}

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Attendre propagation
        run: sleep 30

      - name: Smoke tests frontend
        run: |
          set -e
          URL="https://commanderbuilder.fr"

          echo "=== Test 1: page d'accueil accessible (retry O2Switch restart) ==="
          STATUS=""
          for attempt in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            echo "  Tentative $attempt — Status: $STATUS"
            [ "$STATUS" = "200" ] && break
            sleep 15
          done
          [ "$STATUS" = "200" ] || { echo "FAIL: homepage non-200 après 8 tentatives"; exit 1; }

          echo "=== Test 2: HTTPS forcé ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "http://commanderbuilder.fr/")
          [ "$STATUS" = "200" ] || { echo "FAIL"; exit 1; }

          echo "=== Test 3: manifest PWA accessible ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/manifest.webmanifest")
          echo "  manifest.webmanifest: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: manifest PWA absent"; exit 1; }

          echo "=== Test 4: assets _nuxt/ accessibles ==="
          ASSET=$(curl -s "$URL/" | grep -oE '/_nuxt/[A-Za-z0-9_.-]+\.js' | head -1)
          if [ -n "$ASSET" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL$ASSET")
            echo "  Asset $ASSET : $STATUS"
            [ "$STATUS" = "200" ] || { echo "FAIL"; exit 1; }
          fi

          echo ""
          echo "✅ Tous les smoke tests passent"
