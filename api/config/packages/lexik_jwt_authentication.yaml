lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 14400  # 4 heures
    # Extraire le JWT depuis le cookie HttpOnly OU le header Authorization (fallback)
    token_extractors:
        cookie:
            enabled: true
            name: auth_token
        authorization_header:
            enabled: true
            prefix: Bearer
